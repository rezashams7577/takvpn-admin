services:
  admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://host.docker.internal:8080}
        NEXT_PUBLIC_USER_APP_URL: ${NEXT_PUBLIC_USER_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_ADMIN_APP_URL: ${NEXT_PUBLIC_ADMIN_APP_URL:-http://localhost:3001}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3001}
    ports:
      - "${ADMIN_PORT:-3001}:3000"
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://takvpn-api:8080}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
