# Reverse proxy for TakVPN admin (Next.js on localhost:3001)
# Install:
#   sudo cp deploy/nginx/admin.takvpn.com.conf /etc/nginx/sites-available/admin.takvpn.com
#   sudo ln -sf /etc/nginx/sites-available/admin.takvpn.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d admin.takvpn.com   # if HTTPS not already configured

upstream takvpn_admin {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.takvpn.com;

    client_max_body_size 20m;

    location / {
        proxy_pass http://takvpn_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
